<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Glass overlay -->
  <rect width="64" height="64" rx="16" fill="url(#glass)"/>
  <!-- Top highlight -->
  <rect x="8" y="8" width="48" height="20" rx="8" fill="rgba(255,255,255,0.18)"/>
  <!-- = symbol -->
  <rect x="16" y="26" width="32" height="5" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="16" y="35" width="32" height="5" rx="2.5" fill="white" opacity="0.95"/>
</svg>
